openapi: 3.1.0
info:
  title: t3code-api
  description: REST bridge for T3 Code — control coding agent sessions over plain HTTP.
  version: 0.0.20

servers:
  - url: http://localhost:4774
    description: Local bridge (default port)

security:
  - BearerAuth: []

paths:
  /health:
    get:
      operationId: getHealth
      summary: Bridge health check
      tags: [System]
      security: []
      responses:
        "200":
          description: Bridge status
          content:
            application/json:
              schema:
                type: object
                required: [ok, connected, lastSequence]
                properties:
                  ok:
                    type: boolean
                  connected:
                    type: boolean
                    description: Whether the bridge has an active WebSocket to T3 Code
                  lastSequence:
                    type: integer
                    description: Highest observed event sequence number

  /snapshot:
    get:
      operationId: getSnapshot
      summary: Full orchestration state
      description: Pass-through to T3 Code's `orchestration.getSnapshot`. Returns all projects, threads, messages, and sessions.
      tags: [System]
      responses:
        "200":
          description: Orchestration snapshot
          content:
            application/json:
              schema:
                type: object
                description: Full T3 Code orchestration read model (shape varies by server version)

  /threads:
    post:
      operationId: createThread
      summary: Create a new thread
      tags: [Threads]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateThreadRequest"
      responses:
        "201":
          description: Thread created (and optionally first turn started)
          content:
            application/json:
              schema:
                type: object
                required: [threadId]
                properties:
                  threadId:
                    type: string
                    format: uuid
                  messageId:
                    type: string
                    format: uuid
                    description: "Present only when `initialMessage` was provided."

  /threads/{threadId}:
    delete:
      operationId: deleteThread
      summary: Delete a thread
      tags: [Threads]
      parameters:
        - $ref: "#/components/parameters/ThreadId"
      responses:
        "200":
          description: Thread deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean

  /threads/{threadId}/messages:
    post:
      operationId: sendMessage
      summary: Send a message and start a turn
      description: Sends a user message to the thread, which starts an agent turn. Poll `GET /threads/{threadId}/messages` or `/threads/{threadId}/status` to track progress.
      tags: [Messages]
      parameters:
        - $ref: "#/components/parameters/ThreadId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "201":
          description: Message sent, turn started
          content:
            application/json:
              schema:
                type: object
                required: [messageId, commandId]
                properties:
                  messageId:
                    type: string
                    format: uuid
                  commandId:
                    type: string
                    format: uuid

    get:
      operationId: getMessages
      summary: Read thread messages
      description: Returns user and assistant messages from buffered events. Use `lastSequence` as `after` in the next poll to get only new messages.
      tags: [Messages]
      parameters:
        - $ref: "#/components/parameters/ThreadId"
        - name: after
          in: query
          schema:
            type: integer
            default: 0
          description: Only return messages after this event sequence number
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
          description: Max messages to return
      responses:
        "200":
          description: Thread messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagesResponse"

  /threads/{threadId}/events:
    get:
      operationId: getEvents
      summary: Read raw orchestration events
      description: Returns raw domain events for a thread. Useful for detailed tracking (approvals, activity logs, session changes).
      tags: [Events]
      parameters:
        - $ref: "#/components/parameters/ThreadId"
        - name: after
          in: query
          schema:
            type: integer
            default: 0
          description: Only return events after this sequence number
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
          description: Max events to return
        - name: types
          in: query
          schema:
            type: string
          description: "Comma-separated event types to filter (e.g. `thread.message-sent,thread.session-set`)"
      responses:
        "200":
          description: Thread events
          content:
            application/json:
              schema:
                type: object
                required: [events, lastSequence]
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/DomainEvent"
                  lastSequence:
                    type: integer

  /threads/{threadId}/status:
    get:
      operationId: getThreadStatus
      summary: Get thread session status
      tags: [Threads]
      parameters:
        - $ref: "#/components/parameters/ThreadId"
      responses:
        "200":
          description: Thread status
          content:
            application/json:
              schema:
                type: object
                required: [threadId, status]
                properties:
                  threadId:
                    type: string
                  status:
                    $ref: "#/components/schemas/ThreadStatus"

  /threads/{threadId}/interrupt:
    post:
      operationId: interruptThread
      summary: Interrupt the current turn
      tags: [Threads]
      parameters:
        - $ref: "#/components/parameters/ThreadId"
      responses:
        "200":
          description: Turn interrupted
          content:
            application/json:
              schema:
                type: object
                properties:
                  interrupted:
                    type: boolean

  /server/settings:
    get:
      operationId: getServerSettings
      summary: Get T3 Code server settings
      description: "Returns the current server-authoritative settings: provider configuration, streaming, thread defaults."
      tags: [Server]
      responses:
        "200":
          description: Server settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerSettings"
    patch:
      operationId: updateServerSettings
      summary: Update server settings
      description: Apply a partial settings update. Only provided fields are changed.
      tags: [Server]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerSettingsPatch"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                type: object
                description: Update result from T3 Code server

  /server/providers/refresh:
    post:
      operationId: refreshProviders
      summary: Refresh provider availability
      description: Re-checks installed providers, their versions, auth status, and available models.
      tags: [Server]
      responses:
        "200":
          description: Updated provider list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServerProvider"

  /threads/{threadId}/diff:
    get:
      operationId: getThreadDiff
      summary: Get file changes diff
      description: "Without `to`: returns full thread diff. With `from` and `to`: returns diff between those turn counts."
      tags: [Threads]
      parameters:
        - $ref: "#/components/parameters/ThreadId"
        - name: from
          in: query
          schema:
            type: integer
            default: 0
          description: Starting turn count
        - name: to
          in: query
          schema:
            type: integer
            default: 0
          description: Ending turn count (0 = full thread diff)
      responses:
        "200":
          description: Diff result
          content:
            application/json:
              schema:
                type: object
                description: Diff payload from T3 Code

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Set via `T3API_TOKEN` env var. Optional for local use.

  parameters:
    ThreadId:
      name: threadId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Thread identifier

  schemas:
    Provider:
      type: string
      enum: [codex, claudeAgent]
      description: |
        AI provider backend for the thread.
        - `codex` — OpenAI Codex agent. Models: `gpt-5.4`.
        - `claudeAgent` — Anthropic Claude agent. Models: `claude-opus-4-6`, `claude-sonnet-4-6`.

    RuntimeMode:
      type: string
      enum: [approval-required, full-access]
      default: full-access
      description: |
        Controls tool execution permissions.
        - `full-access` — agent executes tools (shell, file writes) freely without asking.
        - `approval-required` — agent pauses before each tool and waits for approval. Emits `thread.approval-response-requested` events.

    InteractionMode:
      type: string
      enum: [default, plan]
      default: default
      description: |
        Controls whether the agent executes immediately or plans first.
        - `default` — agent starts working on the task immediately.
        - `plan` — agent produces a plan (markdown) first, then waits before executing. Emits `thread.proposed-plan-upserted` events.

    ThreadStatus:
      type: string
      nullable: true
      enum: [idle, starting, running, ready, interrupted, stopped, error, null]
      description: |
        Session lifecycle status.
        - `idle` — no turn in progress, ready for new messages.
        - `starting` — turn initializing, provider session spinning up.
        - `running` — agent actively working (generating, executing tools).
        - `ready` — agent waiting for input (e.g. approval).
        - `interrupted` — turn was interrupted.
        - `stopped` — session was explicitly stopped.
        - `error` — something went wrong (check events for details).
        - `null` — no session events observed yet.

    CreateThreadRequest:
      type: object
      required: [projectId]
      properties:
        projectId:
          type: string
          format: uuid
          description: "Project to create the thread in. Get available project IDs from `GET /snapshot`."
        title:
          type: string
          default: API Thread
          description: Display name for the thread.
        provider:
          allOf:
            - $ref: "#/components/schemas/Provider"
          default: codex
        model:
          type: string
          default: gpt-5.4
          description: |
            Model identifier. Must match the chosen provider:
            - `codex` provider: `gpt-5.4`
            - `claudeAgent` provider: `claude-opus-4-6`, `claude-sonnet-4-6`
        modelOptions:
          $ref: "#/components/schemas/ModelOptions"
        runtimeMode:
          $ref: "#/components/schemas/RuntimeMode"
        interactionMode:
          $ref: "#/components/schemas/InteractionMode"
        workdir:
          type: string
          description: |
            Absolute path to the working directory for this thread.
            The agent will operate in this directory instead of the project's default workspace root.
            Example: `/opt/projects/my-app`
        initialMessage:
          type: object
          description: |
            If provided, sends a user message and starts the first turn immediately after thread creation.
            Combines thread spawn + task into a single request.
          required: [text]
          properties:
            text:
              type: string
              description: User message text.
            attachments:
              type: array
              description: Optional image attachments (see Attachment schema).
              items:
                $ref: "#/components/schemas/Attachment"
        webhook:
          $ref: "#/components/schemas/WebhookConfig"

    SendMessageRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          description: User message text.
        provider:
          allOf:
            - $ref: "#/components/schemas/Provider"
          description: "Override the thread's default provider for this turn only."
        model:
          type: string
          description: |
            Override the thread's default model for this turn only.
            Must match the provider (thread default or overridden).
        modelOptions:
          allOf:
            - $ref: "#/components/schemas/ModelOptions"
          description: "Override model options for this turn only. Requires `provider` or `model` to also be set."
        runtimeMode:
          allOf:
            - $ref: "#/components/schemas/RuntimeMode"
          description: "Override the thread's default runtime mode for this turn only."
        interactionMode:
          allOf:
            - $ref: "#/components/schemas/InteractionMode"
          description: "Override the thread's default interaction mode for this turn only."
        attachments:
          type: array
          description: Optional image attachments.
          items:
            $ref: "#/components/schemas/Attachment"

    Attachment:
      oneOf:
        - $ref: "#/components/schemas/FileAttachment"
        - $ref: "#/components/schemas/DataUrlAttachment"
      description: |
        Image attachment. Two formats supported:
        - **File path** (bridge reads the file and converts to data URL): `{"type": "image", "path": "/abs/path/to/screenshot.png"}`
        - **Data URL** (raw, passed directly to T3 Code): `{"type": "image", "name": "img.png", "mimeType": "image/png", "dataUrl": "data:image/png;base64,...", "sizeBytes": 12345}`

    FileAttachment:
      type: object
      required: [type, path]
      description: |
        Image attachment by local file path. The bridge reads the file, detects MIME type from extension,
        and converts it to a data URL before forwarding to T3 Code.
        Supported extensions: `.png`, `.jpg`, `.jpeg`, `.gif`, `.webp`, `.svg`, `.bmp`.
        Max file size: 10 MB.
      properties:
        type:
          type: string
          enum: [image]
        path:
          type: string
          description: "Absolute path to the image file (e.g. `/tmp/screenshot.png`)."

    DataUrlAttachment:
      type: object
      required: [type, name, mimeType, dataUrl, sizeBytes]
      description: Raw data URL attachment, passed directly to T3 Code without transformation.
      properties:
        type:
          type: string
          enum: [image]
        name:
          type: string
          description: Filename for display.
        mimeType:
          type: string
          description: "MIME type (must start with `image/`)."
        dataUrl:
          type: string
          description: "Base64 data URL (e.g. `data:image/png;base64,...`)."
        sizeBytes:
          type: integer
          description: File size in bytes (max 10 MB).

    MessagesResponse:
      type: object
      required: [messages, lastSequence]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        lastSequence:
          type: integer
          description: "Highest sequence in this response. Use as `?after=` in the next poll to get only new messages."

    Message:
      type: object
      required: [sequence, messageId, role, text, streaming, createdAt, updatedAt]
      properties:
        sequence:
          type: integer
          description: Event sequence number of the latest event for this message.
        messageId:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant, system]
          description: "Who sent the message."
        text:
          type: string
          description: |
            Full accumulated message text. For assistant messages, this is the concatenation
            of all streaming deltas received so far.
        turnId:
          type: string
          nullable: true
          description: "Turn this message belongs to. Null for messages outside a turn."
        streaming:
          type: boolean
          description: |
            Whether the message is still being streamed. `true` means the assistant is still
            generating — text will grow on subsequent polls. `false` means the message is complete.
            User messages are always `false`.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          description: Timestamp of the latest update to this message.

    WebhookConfig:
      type: object
      required: [url]
      description: |
        Optional webhook configuration. When set, the bridge POSTs a JSON payload to `url`
        when the thread's status matches one of the subscribed events.
        Retries 3 times with exponential backoff (1s → 5s → 15s), 10s timeout per attempt.
      properties:
        url:
          type: string
          format: uri
          description: Callback URL — receives POST requests with `WebhookPayload`.
        events:
          type: array
          items:
            type: string
            enum: [completed, error, "status:idle", "status:ready", "status:error", "status:running"]
          default: [completed, error]
          description: |
            Which events to fire. Defaults to `["completed", "error"]`.
            Granular events for precise control:
            - `status:idle` — status transitions to `idle` (agent finished, turn complete).
            - `status:ready` — status transitions to `ready` (agent waiting for input).
            - `status:error` — status transitions to `error`.
            - `status:running` — status transitions to `running`.
            Backward-compatible aliases:
            - `completed` — alias for `status:idle` + `status:ready`.
            - `error` — alias for `status:error`.
        headers:
          type: object
          additionalProperties:
            type: string
          description: Extra headers sent with every callback (e.g. `{"Authorization": "Bearer xxx"}`).
        metadata:
          type: object
          description: |
            Arbitrary JSON returned unchanged in every callback payload.
            For `openclaw-hooks` format, the following keys have special meaning:
            - `agentId` — maps to `agentId` in the OpenClaw payload.
            - `sessionKey` — maps to `sessionKey` (targets a specific session/DM).
            - `host` — included in the notification message text.
        format:
          type: string
          enum: [default, openclaw-hooks]
          default: default
          description: |
            Payload format for webhook delivery.
            - `default` — native t3code payload (`WebhookPayload` schema).
            - `openclaw-hooks` — transforms payload to OpenClaw `/hooks/agent` format.
              Uses `metadata.sessionKey` and `metadata.agentId` to target the correct session.

    WebhookPayload:
      type: object
      required: [event, webhookSeq, message, threadId, projectId, title, previousStatus, status, durationMs, messagesCount]
      description: |
        Payload POSTed to the webhook URL. Sent with headers:
        - `Content-Type: application/json`
        - `X-T3-Event: <event>` (granular event name, e.g. `status:idle`)
        - `X-T3-Thread: <threadId>`
        - Plus any custom headers from the webhook config.
      properties:
        event:
          type: string
          enum: ["status:idle", "status:ready", "status:error", "status:running"]
          description: "Granular event name (e.g. `status:idle`). Always uses the `status:*` form, even when subscribed via aliases."
        webhookSeq:
          type: integer
          description: Auto-incrementing sequence number per thread (1, 2, 3...). Useful for deduplication and ordering.
        message:
          type: string
          description: |
            Human-readable summary of the event, e.g. `"Fix calendar bug: status:idle (184 msgs, 42s)"`.
            Includes error text for error events. Useful for Slack, Discord, or any consumer that
            needs a ready-to-display notification.
        threadId:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        title:
          type: string
          description: Thread title.
        previousStatus:
          type: string
          nullable: true
          description: "Status before this transition (e.g. `running`). `null` if this is the first status change."
        status:
          type: string
          description: "Current thread status (e.g. `idle`, `ready`, `error`)."
        durationMs:
          type: integer
          description: Milliseconds since thread creation.
        messagesCount:
          type: integer
          description: Total number of accumulated messages in the thread.
        metadata:
          type: object
          description: The `metadata` object from the webhook config, returned unchanged.
        error:
          type: string
          description: "Present only for `status:error` events — describes what went wrong."

    DomainEvent:
      type: object
      required: [sequence, eventId, type, aggregateId, occurredAt, payload]
      properties:
        sequence:
          type: integer
          description: Monotonically increasing event sequence.
        eventId:
          type: string
          format: uuid
        type:
          type: string
          description: |
            Event type. Known types:
            - `thread.created` — thread was created.
            - `thread.deleted` — thread was deleted.
            - `thread.message-sent` — user or assistant message persisted.
            - `thread.session-set` — session status changed.
            - `thread.turn-start-requested` — a turn was requested.
            - `thread.turn-diff-completed` — turn finished, file diff available.
            - `thread.activity-appended` — activity log entry (tool calls, info, errors).
            - `thread.approval-response-requested` — agent waiting for tool approval.
            - `thread.meta-updated` — thread metadata changed.
            - `thread.runtime-mode-set` — runtime mode changed.
            - `thread.interaction-mode-set` — interaction mode changed.
            - `thread.proposed-plan-upserted` — agent produced or updated a plan.
        aggregateId:
          type: string
          description: Thread or project ID this event belongs to.
        occurredAt:
          type: string
          format: date-time
        payload:
          type: object
          description: Event-specific payload (shape varies by event type).

    ModelOptions:
      type: object
      description: |
        Provider-specific model options. Fields depend on the provider:
        - **Codex**: `reasoningEffort` (`xhigh`, `high`, `medium`, `low`), `fastMode` (boolean).
        - **Claude**: `thinking` (boolean), `effort` (`low`, `medium`, `high`, `max`, `ultrathink`), `fastMode` (boolean), `contextWindow` (string, e.g. `"200k"`).
      properties:
        reasoningEffort:
          type: string
          enum: [xhigh, high, medium, low]
          description: "Codex reasoning effort level."
        fastMode:
          type: boolean
          description: "Enable fast mode (both providers)."
        thinking:
          type: boolean
          description: "Enable thinking/extended reasoning (Claude only)."
        effort:
          type: string
          enum: [low, medium, high, max, ultrathink]
          description: "Claude reasoning effort level."
        contextWindow:
          type: string
          description: "Claude context window override (e.g. `200k`)."

    ServerSettings:
      type: object
      description: Server-authoritative settings from T3 Code.
      properties:
        enableAssistantStreaming:
          type: boolean
        defaultThreadEnvMode:
          type: string
          enum: [local, worktree]
        textGenerationModelSelection:
          type: object
          description: Model used for git text generation (commit messages, etc.)
        providers:
          type: object
          properties:
            codex:
              $ref: "#/components/schemas/ProviderSettings"
            claudeAgent:
              $ref: "#/components/schemas/ProviderSettings"

    ProviderSettings:
      type: object
      properties:
        enabled:
          type: boolean
        binaryPath:
          type: string
        homePath:
          type: string
          description: "Codex only — home directory path."
        customModels:
          type: array
          items:
            type: string

    ServerSettingsPatch:
      type: object
      description: Partial settings update. Only include fields you want to change.
      properties:
        enableAssistantStreaming:
          type: boolean
        defaultThreadEnvMode:
          type: string
          enum: [local, worktree]
        textGenerationModelSelection:
          type: object
        providers:
          type: object
          properties:
            codex:
              type: object
              properties:
                enabled:
                  type: boolean
                binaryPath:
                  type: string
                customModels:
                  type: array
                  items:
                    type: string
            claudeAgent:
              type: object
              properties:
                enabled:
                  type: boolean
                binaryPath:
                  type: string
                customModels:
                  type: array
                  items:
                    type: string

    ServerProvider:
      type: object
      description: Provider availability status.
      required: [provider, enabled, installed, status, authStatus, models]
      properties:
        provider:
          $ref: "#/components/schemas/Provider"
        enabled:
          type: boolean
        installed:
          type: boolean
        version:
          type: string
          nullable: true
        status:
          type: string
          enum: [ready, warning, error, disabled]
        authStatus:
          type: string
          enum: [authenticated, unauthenticated, unknown]
        checkedAt:
          type: string
          format: date-time
        message:
          type: string
          description: Human-readable status message (warnings, errors).
        models:
          type: array
          items:
            type: object
            properties:
              slug:
                type: string
              name:
                type: string
              isCustom:
                type: boolean
